<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊</title>
    <style>
        body {
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            overflow-y: auto;
            transition: background 1s ease;
            background-size: 40px 40px;
        }

        /* 徹夜之歌迷幻深夜風背景 */
        body.lvl-1 {
            background-color: #070b12;
            background-image: linear-gradient(to right, rgba(155, 89, 182, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(155, 89, 182, 0.08) 1px, transparent 1px);
        }
        body.lvl-2 {
            background-color: #0d0b18;
            background-image: linear-gradient(to right, rgba(52, 152, 219, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(52, 152, 219, 0.08) 1px, transparent 1px);
        }
        body.lvl-3 {
            background-color: #140b1c;
            background-image: linear-gradient(to right, rgba(142, 68, 173, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(142, 68, 173, 0.08) 1px, transparent 1px);
        }
        body.lvl-4 {
            background-color: #190924;
            background-image: linear-gradient(to right, rgba(231, 76, 60, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(231, 76, 60, 0.08) 1px, transparent 1px);
        }
        body.lvl-5 {
            background-color: #220526;
            background-image: linear-gradient(to right, rgba(241, 196, 15, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(241, 196, 15, 0.1) 1px, transparent 1px);
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 32px;
            text-shadow: 0 0 15px rgba(155, 89, 182, 0.6);
            letter-spacing: 4px;
        }

        /* 總舞台 */
        .stage-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            max-width: 1200px;
        }

        /* 徹夜之歌動漫角色區（沒圖時會觸發帥氣的霓虹特效） */
        .anime-char {
            width: 180px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            pointer-events: none;
            border-radius: 12px;
            background: rgba(155, 89, 182, 0.03);
            border: 1px dashed rgba(155, 89, 182, 0.2);
            position: relative;
            overflow: hidden;
        }
        .anime-char img {
            position: absolute;
            bottom: 0;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 20px rgba(155, 89, 182, 0.5));
            transition: all 0.5s ease;
            z-index: 2;
        }
        /* 圖片沒載入時的文字發光特效 */
        .char-fallback-text {
            font-size: 24px;
            font-weight: bold;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 10px rgba(155, 89, 182, 0.8), 0 0 20px rgba(155, 89, 182, 0.5);
            opacity: 0.8;
            z-index: 1;
        }

        /* 遊戲中央主容器 */
        .game-container {
            display: flex;
            gap: 20px;
            background: rgba(16, 18, 30, 0.85);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(155, 89, 182, 0.2);
        }

        /* 調整後的畫布寬高比（220 x 500），讓方塊比例恢復經典微修長感 */
        #game-board {
            width: 220px;
            height: 500px;
            border: 3px solid #9b59b6;
            background-color: rgba(10, 11, 18, 0.95);
            border-radius: 8px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
        }

        /* 側邊資訊面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 220px;
        }

        .info-box {
            background: rgba(10, 11, 18, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(155, 89, 182, 0.3);
        }

        .info-box h3 {
            margin: 0 0 4px 0;
            font-size: 11px;
            color: #a29bfe;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            color: #00cec9;
            text-shadow: 0 0 8px rgba(0, 206, 201, 0.4);
        }

        /* 下一個方塊預覽畫布 */
        #next-box {
            display: block;
            margin: 5px auto 0 auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }

        /* 排行榜 */
        .leaderboard-box {
            background: rgba(10, 11, 18, 0.85);
            border: 1px solid #f1c40f;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 6px;
        }
        .leaderboard-box h3 {
            margin: 0 0 4px 0;
            font-size: 12px;
            color: #f1c40f;
            text-align: center;
        }
        .leaderboard-list {
            margin: 0;
            padding: 0;
            list-style: none;
            font-size: 12px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .leaderboard-item:last-child { border: none; }

        /* 按鈕 */
        .btn {
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 5px;
        }

        .btn:disabled {
            background-color: #7f8c8d !important;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #start-btn { background-color: #00cec9; box-shadow: 0 3px 0 #00b894; color: #000; }
        #start-btn:hover { background-color: #00b894; }

        #skill-btn { background-color: #9b59b6; box-shadow: 0 3px 0 #8e44ad; }
        #skill-btn:hover:not(:disabled) { background-color: #8e44ad; }

        #bomb-btn { background-color: #e67e22; box-shadow: 0 3px 0 #d35400; }
        #bomb-btn:hover:not(:disabled) { background-color: #d35400; }
        
        .skill-active {
            animation: pulse 0.8s infinite;
            box-shadow: 0 0 15px #e67e22 !important;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .instructions {
            margin-top: 8px;
            font-size: 11px;
            color: #b2bec3;
            line-height: 1.4;
        }

        /* 彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: #2d3436;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            max-width: 350px;
            border: 2px solid #00cec9;
            box-shadow: 0 0 25px rgba(0, 206, 201, 0.4);
        }

        .modal-input {
            width: 80%;
            padding: 8px;
            margin: 15px 0 5px 0;
            border: 2px solid #b2bec3;
            border-radius: 4px;
            background: #1e272e;
            color: #fff;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body class="lvl-1">

    <h1>俄羅斯方塊</h1>

    <div class="stage-wrapper">
        <div class="anime-char">
            <span class="char-fallback-text" id="text-left">七草薺</span>
            <img id="char-left" src="nazuna.png" alt="七草薺" onload="document.getElementById('text-left').style.display='none';" onerror="this.style.display='none';">
        </div>

        <div class="game-container">
            <canvas id="game-board" width="220" height="500"></canvas>

            <div class="side-panel">
                <div>
                    <div class="info-box" style="text-align: center;">
                        <h3>NEXT / 下一個方塊</h3>
                        <canvas id="next-box" width="80" height="80"></canvas>
                    </div>

                    <div class="leaderboard-box">
                        <h3>🏆 歷史排行榜 (TOP 3)</h3>
                        <ul class="leaderboard-list" id="leaderboard">
                            <li class="leaderboard-item"><span class="player-name">1. 空缺</span><span>0</span></li>
                            <li class="leaderboard-item"><span class="player-name">2. 空缺</span><span>0</span></li>
                            <li class="leaderboard-item"><span class="player-name">3. 空缺</span><span>0</span></li>
                        </ul>
                    </div>

                    <div class="info-box">
                        <h3>SCORE / 分數</h3>
                        <p id="score">0</p>
                    </div>
                    <div class="info-box">
                        <h3>LEVEL / 關卡</h3>
                        <p id="level">1 / 5</p>
                    </div>
                    <div class="info-box">
                        <h3>TIME / 時間</h3>
                        <p id="time">00:00</p>
                    </div>
                </div>

                <div>
                    <button id="skill-btn" class="btn" onclick="useUltimateSkill()">一鍵全清 [Q] (剩1次)</button>
                    <button id="bomb-btn" class="btn" onclick="activateBombSkill()">集群炸彈 [E] (剩20次)</button>
                    <button id="start-btn" class="btn" onclick="startGame()">開始遊戲</button>
                </div>

                <div class="instructions">
                    <strong>操作：</strong> ← ➡️ 移動 | ⬆️ 旋轉<br>
                    ⬇️ 加速下落 | 空白鍵 瞬落<br>
                    <b>[Q]</b> 一鍵清空 | <b>[E]</b> 九宮格炸彈
                </div>
            </div>
        </div>

        <div class="anime-char">
            <span class="char-fallback-text" id="text-right">夜守更</span>
            <img id="char-right" src="kou_normal.png" alt="夜守更" onload="document.getElementById('text-right').style.display='none';" onerror="this.style.display='none';">
        </div>
    </div>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">遊戲結束</h2>
            <p id="modal-desc"></p>
            <div id="name-input-area">
                <label for="player-name-field" style="font-size: 13px; color: #b2bec3;">請輸入榮譽榜大名：</label><br>
                <input type="text" id="player-name-field" class="modal-input" maxlength="10">
            </div>
            <button class="btn" style="background-color: #00cec9; color:#000;" onclick="handleModalSubmit()">確定</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-box');
        const nextCtx = nextCanvas.getContext('2d');
        
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const timeElement = document.getElementById('time');
        const skillBtn = document.getElementById('skill-btn');
        const bombBtn = document.getElementById('bomb-btn');
        const playerNameField = document.getElementById('player-name-field');
        const charRightImg = document.getElementById('char-right');
        const textRightSpan = document.getElementById('text-right');

        const ROW = 20;
        const COL = 10;
        
        // 配合畫布 220x500，計算出精準的方塊微修長感尺寸
        const BLOCK_W = 22; 
        const BLOCK_H = 25; 

        const COLORS = [
            null,
            '#ff7675', '#74b9ff', '#a29bfe', '#ffeaa7', '#e84393', '#00cec9', '#fdcb6e'
        ];

        const SHAPES = [
            [],
            [[1, 1, 0], [0, 1, 1], [0, 0, 0]], 
            [[0, 2, 2], [2, 2, 0], [0, 0, 0]], 
            [[3, 0, 0], [3, 3, 3], [0, 0, 0]], 
            [[4, 4], [4, 4]],                  
            [[0, 0, 5], [5, 5, 5], [0, 0, 0]], 
            [[0, 6, 0], [6, 6, 6], [0, 0, 0]], 
            [[0, 0, 0, 0], [7, 7, 7, 7], [0, 0, 0, 0], [0, 0, 0, 0]] 
        ];

        const SPEED_LEVELS = { 1: 800, 2: 600, 3: 400, 4: 250, 5: 120 };
        const LEVEL_THRESHOLDS = { 1: 1000, 2: 3000, 3: 6000, 4: 10000, 5: 15000 };

        let grid = [];
        let score = 0;
        let level = 1;
        let gameOver = false;
        let gameRunning = false;
        let isPaused = false; // 新增：用於控制彈窗時方塊停止移動
        
        let timerInterval = null;
        let gameInterval = null;
        let totalSeconds = 0;
        
        let skillAvailable = true;
        let bombAmmo = 20;
        let bombActive = false;

        let currentPiece = { matrix: null, x: 0, y: 0, colorIndex: 0 };
        let nextPieceId = 1;

        function initGrid() {
            grid = [];
            for (let r = 0; r < ROW; r++) {
                grid[r] = new Array(COL).fill(0);
            }
        }

        function updateLeaderboardUI() {
            let records = JSON.parse(localStorage.getItem('tetris_player_records')) || [];
            const listElement = document.getElementById('leaderboard');
            listElement.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                let item = records[i];
                let li = document.createElement('li');
                li.className = 'leaderboard-item';
                if (item) {
                    li.innerHTML = `<span class="player-name">${i+1}. ${item.name}</span><span>${item.score}</span>`;
                } else {
                    li.innerHTML = `<span class="player-name">${i+1}. 空缺</span><span>0</span>`;
                }
                listElement.appendChild(li);
            }
        }

        function saveScore(name, finalScore) {
            if(finalScore <= 0) return;
            let records = JSON.parse(localStorage.getItem('tetris_player_records')) || [];
            let finalName = name.trim() || "無名英雄";
            records.push({ name: finalName, score: finalScore });
            records.sort((a, b) => b.score - a.score);
            records = records.slice(0, 3);
            localStorage.setItem('tetris_player_records', JSON.stringify(records));
            updateLeaderboardUI();
        }

        function initFirstPieces() {
            nextPieceId = Math.floor(Math.random() * 7) + 1;
            generateNext();
        }

        function generateNext() {
            if (bombActive) {
                bombActive = false;
                bombBtn.classList.remove('skill-active');
            }

            const id = nextPieceId;
            const matrix = SHAPES[id];
            currentPiece.matrix = JSON.parse(JSON.stringify(matrix));
            currentPiece.colorIndex = id;
            currentPiece.y = id === 7 ? -1 : 0; 
            currentPiece.x = Math.floor((COL - matrix[0].length) / 2);

            nextPieceId = Math.floor(Math.random() * 7) + 1;
            drawNextPreview();

            if (checkCollision(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
                endGame(false);
            }
        }

        function drawNextPreview() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            const matrix = SHAPES[nextPieceId];
            const size = 16; 
            const offsetX = (nextCanvas.width - matrix[0].length * size) / 2;
            const offsetY = (nextCanvas.height - matrix.length * size) / 2;

            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] > 0) {
                        nextCtx.fillStyle = COLORS[nextPieceId];
                        nextCtx.fillRect(offsetX + c * size, offsetY + r * size, size - 1, size - 1);
                    }
                }
            }
        }

        function drawBlock(x, y, colorIndex, isBomb = false) {
            ctx.fillStyle = isBomb ? '#e67e22' : COLORS[colorIndex];
            ctx.fillRect(x * BLOCK_W, y * BLOCK_H, BLOCK_W, BLOCK_H);
            ctx.strokeStyle = 'rgba(10, 11, 18, 0.5)';
            ctx.strokeRect(x * BLOCK_W, y * BLOCK_H, BLOCK_W, BLOCK_H);
        }

        function drawGhostBlock(x, y) {
            ctx.strokeStyle = bombActive ? 'rgba(230, 126, 34, 0.6)' : 'rgba(255, 255, 255, 0.2)'; 
            ctx.setLineDash([4, 3]); 
            ctx.strokeRect(x * BLOCK_W + 1, y * BLOCK_H + 1, BLOCK_W - 2, BLOCK_H - 2);
            ctx.setLineDash([]); 
        }

        function getGhostY() {
            let ghostY = currentPiece.y;
            while (!checkCollision(currentPiece.matrix, currentPiece.x, ghostY + 1)) {
                ghostY++;
            }
            return ghostY;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < ROW; r++) {
                for (let c = 0; c < COL; c++) {
                    if (grid[r][c] > 0) drawBlock(c, r, grid[r][c]);
                }
            }

            if (!currentPiece.matrix || gameOver) return;

            const ghostY = getGhostY();
            if (ghostY > currentPiece.y) {
                for (let r = 0; r < currentPiece.matrix.length; r++) {
                    for (let c = 0; c < currentPiece.matrix[r].length; c++) {
                        if (currentPiece.matrix[r][c] > 0 && ghostY + r >= 0) {
                            drawGhostBlock(currentPiece.x + c, ghostY + r);
                        }
                    }
                }
            }

            for (let r = 0; r < currentPiece.matrix.length; r++) {
                for (let c = 0; c < currentPiece.matrix[r].length; c++) {
                    if (currentPiece.matrix[r][c] > 0 && currentPiece.y + r >= 0) {
                        drawBlock(currentPiece.x + c, currentPiece.y + r, currentPiece.colorIndex, bombActive);
                    }
                }
            }
        }

        function checkCollision(matrix, nextX, nextY) {
            for (let r = 0; r < matrix.length; r++) {
                for (let c = 0; c < matrix[r].length; c++) {
                    if (matrix[r][c] > 0) {
                        let targetX = nextX + c;
                        let targetY = nextY + r;
                        if (targetY < 0) {
                            if (targetX < 0 || targetX >= COL) return true;
                            continue;
                        }
                        if (targetX < 0 || targetX >= COL || targetY >= ROW) return true;
                        if (grid[targetY][targetX] > 0) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (bombActive) {
                for (let r = 0; r < currentPiece.matrix.length; r++) {
                    for (let c = 0; c < currentPiece.matrix[r].length; c++) {
                        if (currentPiece.matrix[r][c] > 0) {
                            let centerPieceY = currentPiece.y + r;
                            let centerPieceX = currentPiece.x + c;
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    let targetY = centerPieceY + dr;
                                    let targetX = centerPieceX + dc;
                                    if (targetY >= 0 && targetY < ROW && targetX >= 0 && targetX < COL) {
                                        grid[targetY][targetX] = 0; 
                                    }
                                }
                            }
                        }
                    }
                }
                score += 50;
                checkLevelUp();
            } else {
                for (let r = 0; r < currentPiece.matrix.length; r++) {
                    for (let c = 0; c < currentPiece.matrix[r].length; c++) {
                        if (currentPiece.matrix[r][c] > 0 && currentPiece.y + r >= 0) {
                            grid[currentPiece.y + r][currentPiece.x + c] = currentPiece.colorIndex;
                        }
                    }
                }
            }
            clearLines();
            generateNext();
            draw();
        }

        function clearLines() {
            let linesClearedThisTurn = 0;
            for (let r = ROW - 1; r >= 0; r--) {
                if (grid[r].every(val => val > 0)) {
                    grid.splice(r, 1);
                    grid.unshift(new Array(COL).fill(0));
                    linesClearedThisTurn++;
                    r++;
                }
            }
            if (linesClearedThisTurn > 0) {
                const scoreRewards = [0, 100, 300, 500, 800];
                score += scoreRewards[linesClearedThisTurn] * level;
                checkLevelUp();
                updateUI();
            }
        }

        function checkLevelUp() {
            if (score >= LEVEL_THRESHOLDS[level]) {
                if (level < 5) {
                    level++;
                    document.body.className = `lvl-${level}`;
                    
                    // 第4關後右側轉換為半吸血鬼化戰鬥型態
                    if (level >= 4) {
                        charRightImg.src = 'kou_vampire.png';
                        textRightSpan.innerText = "夜守更(半吸血鬼)";
                    }
                    
                    updateGameSpeed();
                    showModal("LEVEL UP", `進入第 ${level} 關，黑夜變得更深邃了...`, true);
                } else if (score >= LEVEL_THRESHOLDS[5]) {
                    endGame(true);
                }
            }
        }

        function drop() {
            if (gameOver || isPaused) return; // 彈窗暫停時不下落
            if (!checkCollision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
            draw();
        }

        function rotate() {
            const matrix = currentPiece.matrix;
            const n = matrix.length;
            let rotated = Array.from({ length: n }, () => new Array(n).fill(0));
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) rotated[c][n - 1 - r] = matrix[r][c];
            }
            if (!checkCollision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.matrix = rotated;
            } else if (!checkCollision(rotated, currentPiece.x - 1, currentPiece.y)) {
                currentPiece.x--; currentPiece.matrix = rotated;
            } else if (!checkCollision(rotated, currentPiece.x + 1, currentPiece.y)) {
                currentPiece.x++; currentPiece.matrix = rotated;
            }
            draw();
        }

        function useUltimateSkill() {
            if (!gameRunning || gameOver || isPaused || !skillAvailable) return;
            initGrid();
            skillAvailable = false;
            score += 500; 
            checkLevelUp();
            updateUI();
            draw();
        }

        function activateBombSkill() {
            if (!gameRunning || gameOver || isPaused || bombAmmo <= 0 || bombActive) return;
            bombActive = true;
            bombAmmo--;
            bombBtn.classList.add('skill-active');
            updateUI();
            draw();
        }

        function updateGameSpeed() {
            clearInterval(gameInterval);
            gameInterval = setInterval(drop, SPEED_LEVELS[level]);
        }

        function updateUI() {
            scoreElement.innerText = score;
            levelElement.innerText = `${level} / 5`;

            if (skillAvailable) {
                skillBtn.innerText = "一鍵全清 [Q] (剩1次)";
                skillBtn.disabled = false;
            } else {
                skillBtn.innerText = "技能1: 已使用";
                skillBtn.disabled = true;
            }
            bombBtn.innerText = `集群炸彈 [E] (剩${bombAmmo}次)`;
            if (bombAmmo <= 0) bombBtn.disabled = true;
        }

        function startTimer() {
            totalSeconds = 0;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused && gameRunning) { // 彈窗暫停時，時間也停止計時
                    totalSeconds++;
                    let mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                    let secs = (totalSeconds % 60).toString().padStart(2, '0');
                    timeElement.innerText = `${mins}:${secs}`;
                }
            }, 1000);
        }

        document.addEventListener('keydown', event => {
            const affectedKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'w', 'W', 's', 'S', 'a', 'A', 'd', 'D', 'q', 'Q', 'e', 'E'];
            if (affectedKeys.includes(event.key)) event.preventDefault(); 

            if (!gameRunning || gameOver || isPaused) return; // 暫停時鎖定鍵盤事件
            const key = event.key.toLowerCase();

            if (event.key === 'ArrowLeft' || key === 'a') {
                if (!checkCollision(currentPiece.matrix, currentPiece.x - 1, currentPiece.y)) { currentPiece.x--; draw(); }
            } else if (event.key === 'ArrowRight' || key === 'd') {
                if (!checkCollision(currentPiece.matrix, currentPiece.x + 1, currentPiece.y)) { currentPiece.x++; draw(); }
            } else if (event.key === 'ArrowDown' || key === 's') {
                drop();
            } else if (event.key === 'ArrowUp' || key === 'w') {
                rotate();
            } else if (key === 'q') {
                useUltimateSkill();
            } else if (key === 'e') {
                activateBombSkill();
            } else if (event.key === ' ') {
                while (!checkCollision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) { currentPiece.y++; }
                lockPiece();
            }
        });

        function startGame() {
            initGrid();
            score = 0;
            level = 1;
            gameOver = false;
            gameRunning = true;
            isPaused = false;
            skillAvailable = true;
            bombAmmo = 20;
            bombActive = false;
            document.body.className = "lvl-1";
            charRightImg.src = 'kou_normal.png';
            charRightImg.style.display = 'block'; 
            textRightSpan.innerText = "夜守更";
            bombBtn.classList.remove('skill-active');
            
            updateUI();
            startTimer();
            initFirstPieces();
            updateGameSpeed();
            draw();

            document.getElementById('start-btn').innerText = "重新開始";
        }

        function endGame(isWin) {
            gameOver = true;
            gameRunning = false;
            isPaused = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);

            const randomID = Math.floor(1000 + Math.random() * 9000);
            playerNameField.value = `夜行者${randomID}`;

            if (isWin) {
                showModal("👑 徹夜通關", `你成功征服了全部 5 個深夜階段！\n最終得分：${score}\n作戰時間：${timeElement.innerText}`, false);
            } else {
                showModal("白晝來臨 (GAME OVER)", `太陽升起了，方塊已達上限！\n結束關卡：第 ${level} 關\n最終積分：${score}`, false);
            }
        }

        function showModal(title, text, isLevelUpNotice = false) {
            isPaused = true; // 打開彈窗的瞬間，把遊戲暫停
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = text;
            const inputArea = document.getElementById('name-input-area');
            inputArea.style.display = isLevelUpNotice ? 'none' : 'block';
            document.getElementById('game-modal').style.display = 'flex';
        }

        function handleModalSubmit() {
            if (!currentModalIsLevelUp) {
                const name = playerNameField.value;
                saveScore(name, score);
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('game-modal').style.display = 'none';
            isPaused = false; // 點擊確定、關閉彈窗後，解除暫停，遊戲繼續！
        }

        updateLeaderboardUI();
        initGrid();
        draw();
    </script>
</body>
</html>
