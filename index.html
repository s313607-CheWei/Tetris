<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊</title>
    <style>
        body {
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            overflow-y: auto;
            transition: background 1s ease;
            background-size: 40px 40px;
        }

        /* 徹夜之歌迷幻深夜風背景 */
        body.lvl-1 {
            background-color: #070b12;
            background-image: linear-gradient(to right, rgba(155, 89, 182, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(155, 89, 182, 0.08) 1px, transparent 1px);
        }
        body.lvl-2 {
            background-color: #0d0b18;
            background-image: linear-gradient(to right, rgba(52, 152, 219, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(52, 152, 219, 0.08) 1px, transparent 1px);
        }
        body.lvl-3 {
            background-color: #140b1c;
            background-image: linear-gradient(to right, rgba(142, 68, 173, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(142, 68, 173, 0.08) 1px, transparent 1px);
        }
        body.lvl-4 {
            background-color: #190924;
            background-image: linear-gradient(to right, rgba(231, 76, 60, 0.08) 1px, transparent 1px), linear-gradient(to bottom, rgba(231, 76, 60, 0.08) 1px, transparent 1px);
        }
        body.lvl-5 {
            background-color: #220526;
            background-image: linear-gradient(to right, rgba(241, 196, 15, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(241, 196, 15, 0.1) 1px, transparent 1px);
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 32px;
            text-shadow: 0 0 15px rgba(155, 89, 182, 0.6);
            letter-spacing: 4px;
        }

        /* 總舞台 */
        .stage-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
            max-width: 1200px;
        }

        /* 徹夜之歌角色定位欄（固定並優化顯示） */
        .anime-char {
            width: 260px;
            height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(155, 89, 182, 0.15);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .anime-char img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 完美填滿容器且不變形 */
            filter: drop-shadow(0 5px 15px rgba(155, 89, 182, 0.3));
        }

        /* 遊戲中央主容器 */
        .game-container {
            display: flex;
            gap: 20px;
            background: rgba(16, 18, 30, 0.85);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(155, 89, 182, 0.2);
        }

        /* 微調優化後的完美稍微拉長比例主畫布 */
        #game-board {
            width: 230px;
            height: 500px;
            border: 3px solid #9b59b6;
            background-color: rgba(10, 11, 18, 0.95);
            border-radius: 8px;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9);
        }

        /* 側邊資訊面板 */
        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 210px;
        }

        .info-box {
            background: rgba(10, 11, 18, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border: 1px solid rgba(155, 89, 182, 0.3);
        }

        .info-box h3 {
            margin: 0 0 4px 0;
            font-size: 11px;
            color: #a29bfe;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box p {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
            color: #00cec9;
            text-shadow: 0 0 8px rgba(0, 206, 201, 0.4);
        }

        /* 下一個方塊預覽畫布 */
        #next-box {
            display: block;
            margin: 5px auto 0 auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }

        /* 排行榜 */
        .leaderboard-box {
            background: rgba(10, 11, 18, 0.85);
            border: 1px solid #f1c40f;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 6px;
        }
        .leaderboard-box h3 {
            margin: 0 0 4px 0;
            font-size: 12px;
            color: #f1c40f;
            text-align: center;
        }
        .leaderboard-list {
            margin: 0;
            padding: 0;
            list-style: none;
            font-size: 12px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .leaderboard-item:last-child { border: none; }

        /* 按鈕 */
        .btn {
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 5px;
        }

        .btn:disabled {
            background-color: #7f8c8d !important;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #start-btn { background-color: #00cec9; box-shadow: 0 3px 0 #00b894; color: #000; }
        #start-btn:hover { background-color: #00b894; }

        #skill-btn { background-color: #9b59b6; box-shadow: 0 3px 0 #8e44ad; }
        #skill-btn:hover:not(:disabled) { background-color: #8e44ad; }

        #bomb-btn { background-color: #e67e22; box-shadow: 0 3px 0 #d35400; }
        #bomb-btn:hover:not(:disabled) { background-color: #d35400; }
        
        .skill-active {
            animation: pulse 0.8s infinite;
            box-shadow: 0 0 15px #e67e22 !important;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .instructions {
            margin-top: 8px;
            font-size: 11px;
            color: #b2bec3;
            line-height: 1.4;
        }

        /* 彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: #2d3436;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            max-width: 350px;
            border: 2px solid #00cec9;
            box-shadow: 0 0 25px rgba(0, 206, 201, 0.4);
        }

        .modal-input {
            width: 80%;
            padding: 8px;
            margin: 15px 0 5px 0;
            border: 2px solid #b2bec3;
            border-radius: 4px;
            background: #1e272e;
            color: #fff;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
